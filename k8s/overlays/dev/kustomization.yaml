apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: circleguard-dev

resources:
  - ../../base

patches:
  - path: patches/auth-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-auth-service
  - path: patches/gateway-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-gateway-service
  - path: patches/identity-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-identity-service
  - path: patches/form-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-form-service
  - path: patches/notification-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-notification-service
  - path: patches/promotion-service-nodeport.yaml
    target:
      kind: Service
      name: circleguard-promotion-service

images:
  - name: circleguard-auth-service
    newName: docker.io/juanc0410/circleguard-auth-service
    newTag: latest
  - name: circleguard-identity-service
    newName: docker.io/juanc0410/circleguard-identity-service
    newTag: latest
  - name: circleguard-form-service
    newName: docker.io/juanc0410/circleguard-form-service
    newTag: latest
  - name: circleguard-promotion-service
    newName: docker.io/juanc0410/circleguard-promotion-service
    newTag: latest
  - name: circleguard-gateway-service
    newName: docker.io/juanc0410/circleguard-gateway-service
    newTag: latest
  - name: circleguard-notification-service
    newName: docker.io/juanc0410/circleguard-notification-service
    newTag: latest
