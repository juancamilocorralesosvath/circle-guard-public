apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-form-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: circleguard-form-service
  template:
    metadata:
      labels:
        app: circleguard-form-service
    spec:
      serviceAccountName: circleguard-service
      containers:
      - name: form-service
        image: circleguard-form-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: circleguard-config
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: dev
        - name: DB_NAME
          value: circleguard_form
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-db-credentials
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-db-credentials
              key: DB_PASSWORD
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8086
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-form-service
spec:
  ports:
  - port: 8086
    targetPort: 8086
  selector:
    app: circleguard-form-service
