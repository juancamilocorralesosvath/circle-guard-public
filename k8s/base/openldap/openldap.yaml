apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
      - name: openldap
        image: osixia/openldap:1.5.0
        ports:
        - containerPort: 389
        - containerPort: 636
        env:
        - name: LDAP_ORGANISATION
          value: "CircleGuard"
        - name: LDAP_DOMAIN
          value: "circleguard.edu"
        - name: LDAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-ldap-credentials
              key: LDAP_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: openldap-service
spec:
  ports:
  - port: 389
    targetPort: 389
    name: ldap
  - port: 636
    targetPort: 636
    name: ldaps
  selector:
    app: openldap
