apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j-service
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.26
        ports:
        - containerPort: 7474
        - containerPort: 7687
        env:
        - name: NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              name: circleguard-neo4j-credentials
              key: NEO4J_USERNAME
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-neo4j-credentials
              key: NEO4J_PASSWORD
        - name: NEO4J_AUTH
          value: "$(NEO4J_USERNAME)/$(NEO4J_PASSWORD)"
        - name: NEO4J_PLUGINS
          value: '["apoc"]'
        - name: NEO4J_dbms_connector_bolt_listen__address
          value: :7687
        - name: NEO4J_dbms_connector_bolt_advertised__address
          value: :7687
        volumeMounts:
        - name: neo4jdata
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: neo4jdata
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
spec:
  ports:
  - port: 7474
    targetPort: 7474
    name: http
  - port: 7687
    targetPort: 7687
    name: bolt
  selector:
    app: neo4j
