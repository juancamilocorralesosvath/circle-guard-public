apiVersion: v1
kind: ServiceAccount
metadata:
  name: circleguard-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: circleguard-service-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: circleguard-service-binding
subjects:
  - kind: ServiceAccount
    name: circleguard-service
roleRef:
  kind: Role
  name: circleguard-service-role
  apiGroup: rbac.authorization.k8s.io
