apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: circleguard-gateway-tls
spec:
  secretName: circleguard-gateway-tls
  issuerRef:
    name: circleguard-selfsigned
    kind: ClusterIssuer
  commonName: circleguard-gateway
  dnsNames:
    - circleguard-gateway-service
    - circleguard-gateway-service.circleguard-dev.svc.cluster.local
