spring:
  application:
    name: circleguard-identity-service
  mvc:
    problemdetails:
      enabled: true
  datasource:
    # Default host port 15432 matches docker-compose.dev.yml. K8s overrides DB_HOST/DB_PORT via ConfigMap.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:circleguard_identity}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vault:
  secret: ${VAULT_SECRET:746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536}
  salt: ${VAULT_SALT:deadbeef}
  hash-salt: ${VAULT_HASH_SALT:12345678}

jwt:
  secret: ${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
