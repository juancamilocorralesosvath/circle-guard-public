spring:
  application:
    name: circleguard-auth-service
  datasource:
    # Default host port 15432 matches docker-compose.dev.yml (avoids macOS 5432 conflicts). K8s sets DB_HOST/DB_PORT via ConfigMap.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:circleguard_auth}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:20000}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ldap://${LDAP_HOST:localhost}:${LDAP_PORT:389}
    base: ${LDAP_BASE:dc=circleguard,dc=edu}
    username: ${LDAP_USER:cn=admin,dc=circleguard,dc=edu}
    password: ${LDAP_PASSWORD:admin}

jwt:
  secret: ${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET:my-qr-secret-key-for-dev-1234567890}
  expiration: ${QR_EXPIRATION:300}

server:
  port: ${SERVER_PORT:8180}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
