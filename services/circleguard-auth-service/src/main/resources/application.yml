spring:
  application:
    name: circleguard-auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-service}:${DB_PORT:5432}/${DB_NAME:circleguard_auth}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ldap://${LDAP_HOST:openldap-service}:${LDAP_PORT:389}
    base: ${LDAP_BASE:dc=circleguard,dc=edu}
    username: ${LDAP_USER}
    password: ${LDAP_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET}
  expiration: ${QR_EXPIRATION:300}

server:
  port: ${SERVER_PORT:8180}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  ldap:
    username: ${LDAP_USER:cn=admin,dc=circleguard,dc=edu}
    password: ${LDAP_PASSWORD:admin}

jwt:
  secret: ${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}

qr:
  secret: ${QR_SECRET:my-qr-secret-key-for-dev-1234567890}
