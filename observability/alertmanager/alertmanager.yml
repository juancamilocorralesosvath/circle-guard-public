global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "log-receiver"
  routes:
    - matchers:
        - severity = "critical"
      receiver: "log-receiver"
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: "log-receiver"
    # Logs alerts to Alertmanager's own log — no external webhook needed for dev.
    # In production, replace with a webhook/email/PagerDuty receiver.

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "job"]
