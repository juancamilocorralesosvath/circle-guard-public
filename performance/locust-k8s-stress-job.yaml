apiVersion: batch/v1
kind: Job
metadata:
  name: locust-stress-test
  namespace: circleguard-staging
  labels:
    app: locust-stress-test
    tier: performance
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app: locust-stress-test
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-services
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              for svc in \
                "http://circleguard-auth-service:8180/actuator/health/readiness" \
                "http://circleguard-form-service:8086/actuator/health/readiness" \
                "http://circleguard-gateway-service:8087/actuator/health/readiness" \
                "http://circleguard-promotion-service:8088/actuator/health/readiness"; do
                until curl -sf "$svc" > /dev/null 2>&1; do sleep 5; done
              done
      containers:
        - name: locust
          image: locustio/locust:2.24.1
          imagePullPolicy: Always
          command:
            - locust
            - --locustfile=/scripts/locustfile.py
            - --headless
            - --users=$(LOCUST_USERS)
            - --spawn-rate=$(LOCUST_SPAWN_RATE)
            - --run-time=$(LOCUST_RUN_TIME)
            - --host=$(AUTH_HOST)
            - --html=/results/stress-report.html
            - --csv=/results/stress-stats
            - --loglevel=INFO
          env:
            - name: LOCUST_USERS
              value: "200"
            - name: LOCUST_SPAWN_RATE
              value: "20"
            - name: LOCUST_RUN_TIME
              value: "5m"
            - name: AUTH_HOST
              value: "http://circleguard-auth-service:8180"
            - name: FORM_HOST
              value: "http://circleguard-form-service:8086"
            - name: GATEWAY_HOST
              value: "http://circleguard-gateway-service:8087"
            - name: PROMOTION_HOST
              value: "http://circleguard-promotion-service:8088"
            - name: TEST_USER
              value: "staff_guard"
            - name: TEST_PASSWORD
              value: "password"
            - name: HC_USER
              value: "health_user"
            - name: HC_PASSWORD
              value: "password"
          volumeMounts:
            - name: locust-scripts
              mountPath: /scripts
            - name: locust-results
              mountPath: /results
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: locust-scripts
          configMap:
            name: locust-scripts-config
        - name: locust-results
          emptyDir: {}
