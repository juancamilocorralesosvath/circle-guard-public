# locust_config.ini
# CircleGuard — Locust load-profile configuration
# -------------------------------------------------------
# Usage:
#   locust --config locust_config.ini --profile warmup
#   locust --config locust_config.ini --profile peak
#   locust --config locust_config.ini --profile stress
#
# The [locust] section sets global defaults; per-profile
# overrides are applied via shell scripts (see run_*.sh).

[locust]
locustfile   = locustfile.py
headless     = true
only-summary = false
html         = results/report.html
csv          = results/stats
loglevel     = INFO
