apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: circleguard-promotion-network-delay
  namespace: circleguard-dev
  labels:
    app.kubernetes.io/part-of: circleguard
    circleguard.io/bonus: chaos-engineering
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - circleguard-dev
    labelSelectors:
      app: circleguard-promotion-service
  delay:
    latency: 500ms
    correlation: "25"
    jitter: 50ms
  direction: both
  duration: 60s
