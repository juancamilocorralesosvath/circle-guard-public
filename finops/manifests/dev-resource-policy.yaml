apiVersion: v1
kind: LimitRange
metadata:
  name: circleguard-default-container-limits
  namespace: circleguard-dev
  labels:
    app.kubernetes.io/part-of: circleguard
    circleguard.io/bonus: finops
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "1500m"
        memory: 1536Mi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: circleguard-dev-compute-budget
  namespace: circleguard-dev
  labels:
    app.kubernetes.io/part-of: circleguard
    circleguard.io/bonus: finops
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "10"
    limits.memory: 12Gi
    pods: "40"
